<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery Planner</title>
</head>
<body>
<div id="root"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "shoplistmine.firebaseapp.com",
  projectId: "shoplistmine"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function App() {
  const [user, setUser] = React.useState(null);
  const [lists, setLists] = React.useState([]);
  const [currentListId, setCurrentListId] = React.useState(null);
  const [items, setItems] = React.useState([]);

  // ✅ FIXED createNewList
  const createNewList = async () => {
    if (!user) return;

    const today = new Date().toISOString().split("T")[0];
    const name = `📝 List - ${today}`;

    const newList = {
      name,
      items: [],
      ownerId: user.uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    const docRef = await db.collection("lists").add(newList);

    const list = {
      id: docRef.id,
      name,
      items: []
    };

    // FIX: update state first
    setLists(prev => [list, ...prev]);

    // FIX: set current list directly
    setCurrentListId(list.id);
    setItems([]);
  };

  const loadLists = async (uid) => {
    const snap = await db.collection("lists")
      .where("ownerId", "==", uid)
      .get();

    const data = snap.docs.map(d => ({
      id: d.id,
      ...d.data()
    }));

    setLists(data);

    if (data.length) {
      setCurrentListId(data[0].id);
      setItems(data[0].items || []);
    }
  };

  React.useEffect(() => {
    auth.onAuthStateChanged(async (u) => {
      if (u) {
        setUser(u);
        loadLists(u.uid);
      }
    });
  }, []);

  if (!user) {
    return React.createElement("button", {
      onClick: () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    }, "Login");
  }

  return React.createElement("div", {},
    React.createElement("h2", {}, "My Lists"),

    React.createElement("select", {
      value: currentListId || "",
      onChange: (e) => {
        const id = e.target.value;

        // ✅ FIXED typo here
        if (id === "__PREMADE__") return;

        const list = lists.find(l => l.id === id);
        if (list) {
          setCurrentListId(id);
          setItems(list.items || []);
        }
      }
    },
      lists.map(l =>
        React.createElement("option", { key: l.id, value: l.id }, l.name)
      ),
      // ✅ FIXED value
      React.createElement("option", { value: "__PREMADE__" }, "Load Template")
    ),

    React.createElement("button", { onClick: createNewList }, "+ New List"),

    React.createElement("ul", {},
      items.map(i =>
        React.createElement("li", { key: i.id }, i.name)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root"))
  .render(React.createElement(App));
</script>

</body>
</html>
