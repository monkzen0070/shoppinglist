<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Grocery Planner – Cloud Save</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0e1117; font-family: 'Lora', Georgia, serif; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.22); }
    input:focus, textarea:focus { outline: none; }
    textarea { resize: none; }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #4ade80;
      color: #0e1117;
      padding: 10px 20px;
      border-radius: 30px;
      /* FIX 1: Removed extra nested quotes around font name */
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      z-index: 1000;
      animation: fadeOut 2s ease forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; transform: translateX(-50%) translateY(0); }
      70% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
    }
    button {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    button:active {
      transform: scale(0.98);
    }
    select {
      cursor: pointer;
      background: #1a202c !important;
      border: 2px solid #4ade80 !important;
      color: white !important;
      padding: 8px 12px !important;
      border-radius: 8px !important;
      font-size: 13px !important;
      /* FIX 1 (cont): Removed extra nested quotes around font name */
      font-family: 'DM Mono', monospace !important;
    }
    select option {
      background: #1a202c !important;
      color: white !important;
      padding: 8px !important;
    }
    select:hover {
      background: #2d3748 !important;
      border-color: #86efac !important;
    }
    .button-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .button-group button {
      flex: 1;
      min-width: 70px;
      white-space: nowrap;
    }
    @media (max-width: 480px) {
      .button-group button {
        font-size: 10px !important;
        padding: 6px 10px !important;
        white-space: normal;
        word-break: keep-all;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDn9OwDwlwa_3ZfbecqqekkM-qC2mHAxig",
      authDomain: "shoplistmine.firebaseapp.com",
      projectId: "shoplistmine",
      storageBucket: "shoplistmine.firebasestorage.app",
      messagingSenderId: "425731491010",
      appId: "1:425731491010:web:dc0f5b7e2a81da9d77675b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const PREMADE_LISTS = [
      { name: "🛒 Weekly Groceries", items: ["Milk (2L)", "Brown Bread", "Eggs (12 pcs)", "Butter", "Fresh Vegetables", "Chicken Breast", "Rice (2kg)"] },
      { name: "🥗 Healthy Eating", items: ["Kale / Spinach", "Avocados (3 pcs)", "Quinoa", "Almond Milk", "Chia Seeds", "Salmon Fillet", "Sweet Potatoes"] },
      { name: "🎂 Baking Supplies", items: ["All-purpose Flour", "Granulated Sugar", "Baking Powder", "Vanilla Extract", "Dark Chocolate Chips", "Unsalted Butter"] },
      { name: "🍕 Party Food", items: ["Pizza Base", "Pizza Sauce", "Mozzarella Cheese", "Pepperoni", "Soft Drinks (6-pack)", "Chips & Dip", "Nachos"] },
      { name: "🇮🇳 Indian Kitchen", items: ["Basmati Rice", "Turmeric Powder", "Red Chili Powder", "Cumin Seeds", "Coriander Powder", "Lentils (Toor Dal)", "Garam Masala"] },
      { name: "🥩 BBQ Essentials", items: ["Burger Buns", "Ground Beef", "Sausages", "BBQ Sauce", "Corn on the Cob", "Onions", "Ketchup & Mustard"] },
      { name: "☕ Morning Coffee", items: ["Coffee Beans", "Oat Milk", "Croissants", "Honey", "Bananas (6 pcs)", "Greek Yogurt"] },
      { name: "🧼 Household Items", items: ["Laundry Detergent", "Dish Soap", "Trash Bags", "Paper Towels", "Toilet Paper (12 pack)", "All-purpose Cleaner"] },
      { name: "🍰 Dessert Night", items: ["Ice Cream", "Brownie Mix", "Whipped Cream", "Strawberries", "Chocolate Syrup", "Sprinkles"] },
      { name: "🥑 Vegan Shopping", items: ["Tofu", "Tempeh", "Nutritional Yeast", "Coconut Yogurt", "Plant-based Cheese", "Lentils", "Fresh Herbs"] }
    ];

    function showToast(message) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function parseListText(text) {
      return text.split("\n")
        .map(line => line.replace(/^\s*\d+[.)]\s*/, "").replace(/^\s*[-•*]\s*/, "").trim())
        .filter(Boolean);
    }

    function generateShareLink(listId) {
      return `${window.location.origin}${window.location.pathname}?shared=${listId}`;
    }

    function LoginScreen() {
      const signIn = async () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          await auth.signInWithPopup(provider);
        } catch (error) {
          console.error("Sign in error:", error);
          alert("Sign in failed: " + error.message);
        }
      };

      return React.createElement("div", { 
        style: { minHeight: "100vh", background: "linear-gradient(135deg, #0e1117 0%, #141a24 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 } 
      },
        React.createElement("div", { style: { textAlign: "center", marginBottom: 36 } },
          React.createElement("div", { style: { fontFamily: "'DM Mono', monospace", fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase", color: "rgba(134,239,172,0.55)", marginBottom: 6 } }, "Cloud Market List"),
          React.createElement("h1", { style: { fontFamily: "'Playfair Display', Georgia, serif", fontSize: "clamp(30px, 8vw, 40px)", fontWeight: 800, color: "#fff", letterSpacing: "-0.02em" } },
            "Grocery ",
            React.createElement("span", { style: { background: "linear-gradient(90deg, #4ade80, #86efac)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" } }, "Planner")
          ),
          React.createElement("p", { style: { color: "rgba(255,255,255,0.4)", marginTop: 12, fontFamily: "'DM Mono', monospace", fontSize: 12 } }, "Sign in to save & share your lists")
        ),
        React.createElement("button", { 
          onClick: signIn, 
          style: { padding: "14px 32px", borderRadius: 12, border: "none", background: "#fff", color: "#0e1117", fontSize: 15, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 10, fontFamily: "'DM Mono', monospace", letterSpacing: "0.05em", boxShadow: "0 4px 20px rgba(0,0,0,0.3)" } 
        },
          React.createElement("span", { style: { fontSize: 20 } }, "G"),
          " Sign in with Google"
        )
      );
    }

    function GroceryItem({ item, onToggle, onDelete, readOnly }) {
      const startX = React.useRef(null), startY = React.useRef(null);
      const [offset, setOffset] = React.useState(0);
      const [swiping, setSwiping] = React.useState(false);
      const [dismissed, setDismissed] = React.useState(false);
      const [direction, setDirection] = React.useState(0);

      const handleStart = (cx, cy) => { if (readOnly) return; startX.current = cx; startY.current = cy; setSwiping(true); };
      const handleMove = (cx, cy) => {
        if (readOnly || startX.current === null) return;
        const dx = cx - startX.current, dy = cy - startY.current;
        if (Math.abs(dy) > Math.abs(dx) * 1.5) return;
        setOffset(dx); setDirection(dx > 0 ? 1 : -1);
      };
      const handleEnd = () => {
        if (readOnly) return;
        if (Math.abs(offset) > 80) { setDismissed(true); setTimeout(() => onToggle(item.id), 320); }
        else setOffset(0);
        setSwiping(false); startX.current = null;
      };

      const bgOpacity = Math.min(Math.abs(offset) / 80, 1);

      return React.createElement("div", { style: { position: "relative", overflow: "hidden", marginBottom: 8, borderRadius: 12, height: dismissed ? 0 : undefined, opacity: dismissed ? 0 : 1, transition: dismissed ? "height 0.3s ease, opacity 0.3s ease, margin 0.3s ease" : "none" } },
        !readOnly && React.createElement("div", { style: { position: "absolute", inset: 0, borderRadius: 12, background: direction > 0 ? `rgba(74,222,128,${bgOpacity * 0.28})` : `rgba(251,146,60,${bgOpacity * 0.28})`, display: "flex", alignItems: "center", justifyContent: direction > 0 ? "flex-start" : "flex-end", padding: "0 20px", fontSize: 18 } },
          React.createElement("span", { style: { opacity: bgOpacity } }, direction > 0 ? "✓" : "↩")
        ),
        React.createElement("div", {
          onMouseDown: e => handleStart(e.clientX, e.clientY),
          onMouseMove: e => swiping && handleMove(e.clientX, e.clientY),
          onMouseUp: handleEnd, onMouseLeave: handleEnd,
          onTouchStart: e => handleStart(e.touches[0].clientX, e.touches[0].clientY),
          onTouchMove: e => handleMove(e.touches[0].clientX, e.touches[0].clientY),
          onTouchEnd: handleEnd,
          style: { display: "flex", alignItems: "center", gap: 12, padding: "13px 16px", borderRadius: 12, background: item.done ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.08)", border: `1px solid ${item.done ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.12)"}`, cursor: readOnly ? "default" : "grab", userSelect: "none", transform: `translateX(${offset}px)`, transition: swiping ? "none" : "transform 0.3s cubic-bezier(0.34,1.56,0.64,1)", backdropFilter: "blur(8px)" }
        },
          React.createElement("div", {
            onClick: e => { e.stopPropagation(); if (!readOnly) onToggle(item.id); },
            style: { width: 22, height: 22, borderRadius: "50%", flexShrink: 0, border: `2px solid ${item.done ? "#4ade80" : "rgba(255,255,255,0.25)"}`, background: item.done ? "#4ade80" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: readOnly ? "default" : "pointer", transition: "all 0.2s" }
          },
            item.done && React.createElement("span", { style: { color: "#0e1117", fontSize: 12, fontWeight: 700 } }, "✓")
          ),
          React.createElement("div", { style: { flex: 1 } },
            React.createElement("div", { style: { fontFamily: "'Lora', Georgia, serif", fontSize: 15, fontWeight: 500, color: item.done ? "rgba(255,255,255,0.28)" : "rgba(255,255,255,0.9)", textDecoration: item.done ? "line-through" : "none" } }, item.name)
          ),
          !readOnly && React.createElement("button", {
            onClick: e => { e.stopPropagation(); onDelete(item.id); },
            style: { background: "none", border: "none", color: "rgba(255,255,255,0.18)", fontSize: 17, cursor: "pointer", padding: "4px 6px" }
          }, "×")
        )
      );
    }

    function GroceryApp() {
      const [user, setUser] = React.useState(null);
      const [lists, setLists] = React.useState([]);
      const [currentListId, setCurrentListId] = React.useState(null);
      const [currentListName, setCurrentListName] = React.useState("");
      const [items, setItems] = React.useState([]);
      const [newItemName, setNewItemName] = React.useState("");  // FIX 2: Renamed from newName to newItemName
      const [pasteMode, setPasteMode] = React.useState(false);
      const [pasteText, setPasteText] = React.useState("");
      const [pastePreview, setPastePreview] = React.useState([]);
      const [shareLink, setShareLink] = React.useState("");
      const [isReadOnly, setIsReadOnly] = React.useState(false);
      const [showPremade, setShowPremade] = React.useState(false);

      // FIX 3: selectList moved up before all callers so dependency order is clear
      const selectList = (list) => {
        if (!list) return;
        setCurrentListId(list.id);
        setCurrentListName(list.name);
        setItems(list.items || []);
        setShareLink(generateShareLink(list.id));
        setIsReadOnly(false);
      };

      const saveCurrentList = React.useCallback(async (newItems) => {
        if (!currentListId || !user || isReadOnly) return;
        try {
          await db.collection("lists").doc(currentListId).update({ items: newItems });
        } catch (error) {
          console.error("Save error:", error);
        }
      }, [currentListId, user, isReadOnly]);

      const updateItems = (newItems) => { setItems(newItems); saveCurrentList(newItems); };

      const toggle = React.useCallback(id => {
        if (isReadOnly) return;
        setItems(prev => { const upd = prev.map(i => i.id === id ? { ...i, done: !i.done } : i); saveCurrentList(upd); return upd; });
      }, [saveCurrentList, isReadOnly]);

      const remove = React.useCallback(id => {
        if (isReadOnly) return;
        setItems(prev => { const upd = prev.filter(i => i.id !== id); saveCurrentList(upd); return upd; });
      }, [saveCurrentList, isReadOnly]);

      const addSingle = () => {
        if (isReadOnly) return;
        const name = newItemName.trim(); if (!name) return;  // FIX 2: uses newItemName
        updateItems([...items, { id: Date.now(), name, done: false }]);
        setNewItemName("");  // FIX 2: uses setNewItemName
        showToast(`✓ Added "${name}"`);
      };

      const handlePasteChange = (text) => { setPasteText(text); setPastePreview(parseListText(text)); };
      const importPasted = () => {
        if (isReadOnly) return;
        if (!pastePreview.length) return;
        const newItems = [...items, ...pastePreview.map(name => ({ id: Date.now() + Math.random(), name, done: false }))];
        updateItems(newItems);
        setPasteText(""); setPastePreview([]); setPasteMode(false);
        showToast(`✓ Imported ${pastePreview.length} items`);
      };

      const clearDone = () => { 
        if (!isReadOnly) {
          updateItems(items.filter(i => !i.done));
          showToast("✓ Cleared completed items");
        }
      };
      
      const clearAllItems = () => {
        if (isReadOnly) return;
        if (confirm("Remove ALL items from this list? This cannot be undone.")) {
          updateItems([]);
          showToast("🗑️ All items cleared");
        }
      };

      // FIX 4: Added deleteList function
      const deleteList = async () => {
        if (!user || isReadOnly || !currentListId) return;
        if (!confirm("Delete this list permanently? This cannot be undone.")) return;
        try {
          await db.collection("lists").doc(currentListId).delete();
          const remaining = lists.filter(l => l.id !== currentListId);
          setLists(remaining);
          if (remaining.length > 0) {
            selectList(remaining[0]);
          } else {
            await createDefaultList(user.uid);
          }
          showToast("🗑️ List deleted");
        } catch (error) {
          console.error("Delete list error:", error);
          alert("Failed to delete list");
        }
      };

      const createNewList = async () => {
        if (!user) return;
        const today = new Date().toISOString().split("T")[0];
        const defaultName = `📝 List - ${today}`;
        const newList = { 
          name: defaultName, 
          items: [], 
          ownerId: user.uid, 
          createdAt: firebase.firestore.FieldValue.serverTimestamp() 
        };
        try {
          const docRef = await db.collection("lists").add(newList);
          const list = { id: docRef.id, name: defaultName, items: [], ownerId: user.uid };
          setLists(prev => [list, ...prev]);
          selectList(list);
          showToast("✓ New list created!");
        } catch (error) {
          console.error("Create list error:", error);
          alert("Failed to create new list.\n\nError: " + error.message + "\n\nThis is usually a Firestore security rules issue. Make sure your rules allow authenticated users to write their own documents.");
        }
      };

      const createDefaultList = async (uid) => {
        const today = new Date().toISOString().split("T")[0];
        const newList = { 
          name: `📝 List - ${today}`, 
          items: [], 
          ownerId: uid, 
          createdAt: firebase.firestore.FieldValue.serverTimestamp() 
        };
        const docRef = await db.collection("lists").add(newList);
        const list = { id: docRef.id, name: newList.name, items: [], ownerId: uid };
        setLists([list]);
        selectList(list);
      };

      const loadPremadeList = async (premade) => {
        if (!user) {
          showToast("⚠️ Please sign in first");
          return;
        }
        try {
          const itemsWithIds = premade.items.map((itemName, idx) => ({
            id: Date.now() + idx + Math.random(),
            name: itemName,
            done: false
          }));
          const newList = {
            name: premade.name,
            items: itemsWithIds,
            ownerId: user.uid,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          };
          const docRef = await db.collection("lists").add(newList);
          const list = { id: docRef.id, name: premade.name, items: itemsWithIds, ownerId: user.uid };
          setLists(prev => [list, ...prev]);
          selectList(list);
          setShowPremade(false);
          showToast(`✓ "${premade.name}" loaded with ${premade.items.length} items!`);
        } catch (error) {
          console.error("Error loading premade list:", error);
          alert("Failed to load premade list. Please try again.");
        }
      };

      const copyShareLink = () => {
        if (!shareLink) {
          showToast("⚠️ No list selected");
          return;
        }
        navigator.clipboard.writeText(shareLink).then(() => {
          showToast("✓ Share link copied!");
        }).catch(() => {
          prompt("Copy this link:", shareLink);
        });
      };

      const signOut = () => { 
        auth.signOut(); 
        setUser(null); 
        setCurrentListId(null); 
        setItems([]); 
        setIsReadOnly(false);
        setLists([]);
      };

      const loadUserLists = async (uid) => {
        try {
          // Use simple where-only query (no orderBy) to avoid requiring a composite index.
          // Sort client-side instead so the app works without any index configuration.
          const snap = await db.collection("lists").where("ownerId", "==", uid).get();
          const userLists = snap.docs
            .map(d => ({ id: d.id, name: d.data().name, items: d.data().items || [], ownerId: d.data().ownerId, createdAt: d.data().createdAt }))
            .sort((a, b) => {
              // Firestore Timestamps have .toMillis(); fall back to 0 if missing
              const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
              const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
              return tb - ta; // newest first
            });
          setLists(userLists);
          if (userLists.length > 0) {
            selectList(userLists[0]);
          } else {
            await createDefaultList(uid);
          }
        } catch (error) {
          console.error("Load lists error:", error);
          alert("Could not load your lists.\n\nError: " + error.message + "\n\nCheck your Firestore security rules — they may be blocking reads.");
        }
      };

      // FIX 2 (cont): Renamed parameter from newName -> val to avoid shadowing newItemName state
      const handleNameChange = async (e) => {
        const val = e.target.value;
        setCurrentListName(val);
        if (currentListId && user && !isReadOnly) {
          try {
            await db.collection("lists").doc(currentListId).update({ name: val });
            // Keep local lists in sync
            setLists(prev => prev.map(l => l.id === currentListId ? { ...l, name: val } : l));
          } catch (error) {
            console.error("Update name error:", error);
          }
        }
      };

      // FIX 5: Reset select to currentListId when user cancels the premade modal
      const handleListChange = (e) => {
        const selectedId = e.target.value;
        if (selectedId === "__PREmade__") {
          setShowPremade(true);
          // Reset select value back to current list immediately so it doesn't stay stuck
          e.target.value = currentListId || "";
          return;
        }
        const selected = lists.find(l => l.id === selectedId);
        if (selected) {
          selectList(selected);
        }
      };

      const loadSharedList = async (listId) => {
        try {
          const doc = await db.collection("lists").doc(listId).get();
          if (doc.exists) {
            const data = doc.data();
            setCurrentListId(listId);
            setCurrentListName(data.name);
            setItems(data.items || []);
            setShareLink(generateShareLink(listId));
            setIsReadOnly(true);
            setUser(null);
          } else {
            alert("List not found or has been deleted.");
          }
        } catch (error) {
          console.error("Error loading shared list:", error);
          alert("Could not load the shared list.");
        }
      };

      React.useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const sharedListId = params.get("shared");
        
        if (sharedListId) {
          loadSharedList(sharedListId);
        } else {
          const unsub = auth.onAuthStateChanged(async (fbUser) => {
            if (fbUser) {
              setUser(fbUser);
              await loadUserLists(fbUser.uid);
            } else {
              setUser(null);
              setLists([]);
            }
          });
          return () => unsub();
        }
      }, []);

      if (!user && !currentListId) return React.createElement(LoginScreen);

      const pending = items.filter(i => !i.done);
      const done = items.filter(i => i.done);
      const pct = items.length ? Math.round((done.length / items.length) * 100) : 0;

      return React.createElement("div", { style: { minHeight: "100vh", background: "linear-gradient(135deg, #0e1117 0%, #141a24 50%, #0e1117 100%)", display: "flex", justifyContent: "center", padding: "24px 16px 80px" } },
        React.createElement("div", { style: { width: "100%", maxWidth: 420 } },

          // Top bar
          React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 } },
            // Dropdown row
            React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" } },
              user && !isReadOnly && lists.length > 0 && React.createElement("select", {
                value: currentListId || "",
                onChange: handleListChange,
                style: { flex: 1, minWidth: 150, background: "#1a202c", border: "2px solid #4ade80", borderRadius: 8, padding: "10px 12px", color: "white", fontFamily: "'DM Mono', monospace", fontSize: 13, cursor: "pointer" }
              }, [
                React.createElement("option", { key: "placeholder", value: "", disabled: true }, "📋 Select a list..."),
                ...lists.map(l => React.createElement("option", { key: l.id, value: l.id, style: { background: "#1a202c", color: "white" } }, l.name.length > 25 ? l.name.substring(0, 22) + "..." : l.name)),
                React.createElement("option", { key: "premade", value: "__PREmade__", style: { background: "#4ade80", color: "#0e1117", fontWeight: "bold" } }, "🎯 + Load Premade List")
              ]),
